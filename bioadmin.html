<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Creator Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #1f3cff; --text: #f0f6fc; --text-dim: #8b949e; --border: #30363d; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; display: flex; justify-content: center; }
        .admin-box { width: 100%; max-width: 500px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin: 20px 0; }
        .header { margin-bottom: 25px; text-align: center; }
        .header h2 { font-size: 20px; color: var(--accent); text-transform: uppercase; }
        .form-container { display: flex; flex-direction: column; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }
        input, textarea { background: #0d1117; border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; font-size: 14px; width: 100%; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 10px rgba(31, 60, 255, 0.3); }
        .btn-save { width: 100%; margin-top: 10px; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { opacity: 0.9; transform: translateY(-2px); }
        .info { font-size: 10px; color: var(--text-dim); font-style: italic; margin-top: 2px; }
    </style>
</head>
<body>

<div class="admin-box">
    <div class="header">
        <h2>Post Creator</h2>
    </div>

    <form id="creatorForm" class="form-container">
<div class="input-group">
    <label>ID Creator (Cukup ketik nama panggilannya)</label>
    <input type="text" id="slug" placeholder="Contoh: mobi" required>
</div>

        <div class="input-group"><label>Nama Lengkap</label><input type="text" id="name" required></div>
        <div class="input-group"><label>Link Foto Profil</label><input type="url" id="image_url" placeholder="https://res.cloudinary.com/..." required></div>
        <div class="input-group"><label>Bio Singkat</label><input type="text" id="bio" required></div>
        <div class="input-group"><label>Intro (HTML)</label><textarea id="intro" rows="4"></textarea></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="input-group"><label>Kategori</label><input type="text" id="earned"></div>
            <div class="input-group"><label>Tahun</label><input type="text" id="years"></div>
        </div>

        <div class="input-group"><label>Username IG</label><input type="text" id="rating"></div>
        
        <div class="input-group">
            <label>Region (Pisahkan Koma)</label>
            <input type="text" id="experience" placeholder="Indonesia, Banten">
        </div>
        <div class="input-group">
            <label>Zodiac & Tahun (Pisahkan Koma)</label>
            <input type="text" id="education" placeholder="LEO, 2000">
        </div>
        <div class="input-group">
            <label>Expertise (Pisahkan Koma)</label>
            <input type="text" id="skills" placeholder="Painting, Design">
        </div>
        <div class="input-group">
            <label>Karya (Judul|Link, Judul|Link)</label>
            <textarea id="works" rows="2" placeholder="doki|link.png, reali|link2.png"></textarea>
            <p class="info">Format: Judul|Link, pisahkan antar karya dengan koma.</p>
        </div>

        <button type="submit" class="btn-save" id="btnSave">SIMPAN DATA</button>
    </form>
</div>

<script>
    const SUPABASE_URL = "https://hqetnqnvmdxdgfnnluew.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxZXRucW52bWR4ZGdmbm5sdWV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzUyODIsImV4cCI6MjA4NzMxMTI4Mn0.Cr9lDBZMqfeONi1dfyFzHpBtawBzZTQLBEWKmPJVAOA"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('creatorForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSave');
        const slugValue = document.getElementById('slug').value.toLowerCase().trim(); // Ambil kata 'mobi'
        
        btn.innerText = "SAVING...";
        btn.disabled = true;
        
        try {
            const payload = {
                slug: slugValue,
                name: document.getElementById('name').value,
                image: document.getElementById('image_url').value,
                bio: document.getElementById('bio').value,
                intro: document.getElementById('intro').value,
                earned: document.getElementById('earned').value,
                years: document.getElementById('years').value,
                rating: document.getElementById('rating').value,
                experience: document.getElementById('experience').value.split(',').map(s => s.trim()),
                education: document.getElementById('education').value.split(',').map(s => s.trim()),
                skills: document.getElementById('skills').value.split(',').map(s => s.trim()),
                works: document.getElementById('works').value.split(',').map(item => {
                    const [title, img] = item.split('|');
                    return { title: title?.trim(), image: img?.trim() };
                }).filter(w => w.title && w.image)
            };

            const { error } = await _supabase.from('creators').upsert(payload);

            if (error) throw error;
            
            // Memberi tahu pengguna dan otomatis buka halaman detail
            alert("Data " + slugValue + " berhasil disimpan!");
            window.location.href = `detail.html?creator=${slugValue}`;

        } catch (err) {
            alert("Gagal simpan: " + err.message);
            btn.innerText = "SIMPAN DATA";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
