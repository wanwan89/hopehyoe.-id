<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Hopers</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
/* CSS ASLI KAMU - TIDAK ADA PERUBAHAN TAMPILAN */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#f3f3f3;color:#111;}

.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:15px 40px;background:white;border-bottom:1px solid #ddd;
  font-size:14px;
}

.container{max-width:1200px;margin:auto;padding:30px 20px;}
.hero{margin-bottom:30px;}

.blue-box{
  width:100%; height:340px; border-radius:30px;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  background:linear-gradient(135deg,#1f3cff,#002fd6);
}

.blue-box h1{
  color:white; font-size:90px; font-weight:800;
  transform:rotate(-18deg); line-height:.8; transition:.3s; z-index:2;
}

.hero-image{
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; border-radius:30px; display:none;
}

.tabs{
  position:relative; display:flex; gap:20px; padding:8px;
  background:#eee; border-radius:50px; width:fit-content; margin-bottom:30px;
}

.tabs span{
  padding:10px 20px; cursor:pointer; border-radius:50px;
  position:relative; z-index:2; transition:.3s; color:#111;
}

.tabs span.active { color: white; font-weight: 600; }

.tab-indicator{
  position:absolute; height:100%; background:#1f3cff;
  border-radius:50px; transition:all .3s ease; top:0; left:0;
}

.section{display:none;}
.section.active{display:block;}

.about{ display:grid; grid-template-columns:1fr 1.5fr; gap:30px; }

.profile{
  background:black; color:white; border-radius:25px;
  padding:25px; display:flex; flex-direction:column;
  justify-content:center; min-height:300px;
}

.profile img{
  width:90px; height:90px; border-radius:50%;
  object-fit:cover; margin-bottom:15px;
}

.intro{
  background:white; border-radius:25px; padding:35px;
  box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.intro h3{ margin-bottom:20px; font-size:22px; }
.intro p{ margin-bottom:18px; line-height:1.8; text-align:justify; font-size:15px; color:#333; }

.contact{ margin-top:20px; display:flex; gap:20px; }
.contact-card{
  flex:1; padding:20px; border-radius:20px; text-align:center;
  font-weight:500; background:black; color:white;
  text-decoration:none; transition:.3s;
}

.contact-card:hover{ transform:translateY(-3px); opacity:.85; }
.contact-card.blue{ background:#1f3cff; }

.three{ display:grid; grid-template-columns:repeat(3,1fr); gap:25px; }
.box{ background:white; border-radius:25px; padding:20px; box-shadow:0 5px 20px rgba(0,0,0,.05); }

.timeline{ background:#f6f6f6; padding:15px; border-radius:15px; margin-bottom:15px; font-size:14px; }

.skill-badge{
  display:inline-block; padding:6px 12px; border-radius:20px;
  margin:5px; font-size:13px; background:#eee; color:#111;
  cursor:pointer; transition: all .3s ease;
}

.skill-badge.active{ background:#1f3cff; color:white; }

.work-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top: 20px; }
.work-card {
  background: white; border-radius: 15px; overflow: hidden;
  display: flex; flex-direction: column; align-items: center;
  box-shadow: 0 5px 15px rgba(0,0,0,.1); transition: .3s;
}

.work-card img { width: 100%; height: 120px; object-fit: cover; }
.work-card p { padding: 8px; font-size: 13px; font-weight: 500; text-align: center; }

@media(max-width:1000px){
  .about{grid-template-columns:1fr;}
  .three{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="topbar">
  <strong id="topName">Loading...</strong>
  <div>Creator in Hopehype</div>
</div>

<div class="container">
  <div class="hero">
    <div class="blue-box">
      <h1 id="heroText">HOPE<br>CREAT</h1>
      <img id="heroImage" class="hero-image">
    </div>
  </div>

  <div class="tabs">
    <span class="active" data-tab="about">About me</span>
    <span data-tab="resume">Detail</span>
    <span data-tab="work">Work</span>
    <div class="tab-indicator"></div>
  </div>

  <div class="section active" id="about">
    <div class="about">
      <div class="profile">
        <img id="photo" src="">
        <h2 id="name"></h2>
        <p id="bio" style="font-size:13px;margin-top:10px;opacity:.8;"></p>
      </div>
      <div>
        <div class="intro">
          <h3>Introduction</h3>
          <div id="introContent"></div>
        </div>
        <div class="contact">
          <a class="contact-card" id="instagram" target="_blank"></a>
          <div class="contact-card blue" id="category"></div>
          <div class="contact-card" id="year"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="section" id="resume">
    <div class="three">
      <div class="box">
        <h3>Region</h3>
        <div id="experienceList"></div>
      </div>
      <div class="box">
        <h3>Zodiac</h3>
        <div id="educationList"></div>
      </div>
      <div class="box">
        <h3>Expertise</h3>
        <div id="skillsList"></div>
      </div>
    </div>
  </div>

  <div class="section" id="work">
    <div class="work-grid" id="worksGrid"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

// Konfigurasi Supabase
const SUPABASE_URL = "https://hqetnqnvmdxdgfnnluew.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxZXRucW52bWR4ZGdmbm5sdWV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzUyODIsImV4cCI6MjA4NzMxMTI4Mn0.Cr9lDBZMqfeONi1dfyFzHpBtawBzZTQLBEWKmPJVAOA";
const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// Ambil slug dari URL (?creator=mobi)
const params = new URLSearchParams(window.location.search);
const slug = params.get("creator")?.toLowerCase();

async function loadCreatorData() {
    if (!slug) {
        document.body.innerHTML = "<h2 style='padding:40px'>Parameter creator tidak ditemukan.</h2>";
        return;
    }

    const { data, error } = await _supabase
        .from('creators')
        .select('*')
        .eq('slug', slug)
        .single();

    if (error || !data) {
        document.body.innerHTML = "<h2 style='padding:40px'>Data Kreator tidak ditemukan di database.</h2>";
        return;
    }

    // Mapping Data ke HTML
    document.getElementById('topName').textContent = data.name;
    document.getElementById('name').textContent = data.name;
    document.getElementById('bio').textContent = data.bio;
    document.getElementById('introContent').innerHTML = data.intro;
    
    // Instagram (Rating di DB kamu simpan sebagai Username IG)
    const igBtn = document.getElementById('instagram');
    igBtn.textContent = data.rating.includes('@') ? data.rating : '@' + data.rating;
    igBtn.href = `https://instagram.com/${data.rating.replace('@', '')}`;

    document.getElementById('category').textContent = data.earned;
    document.getElementById('year').textContent = data.years;
    document.getElementById('photo').src = data.image;
    document.getElementById('heroImage').src = data.image;

    // Render Array: Region (Experience)
    const expDiv = document.getElementById('experienceList');
    data.experience?.forEach(item => {
        expDiv.innerHTML += `<div class="timeline">${item}</div>`;
    });

    // Render Array: Zodiac (Education)
    const eduDiv = document.getElementById('educationList');
    data.education?.forEach(item => {
        eduDiv.innerHTML += `<div class="timeline">${item}</div>`;
    });

    // Render Array: Expertise (Skills)
    const skillDiv = document.getElementById('skillsList');
    data.skills?.forEach(s => {
        const span = document.createElement("span");
        span.className = "skill-badge";
        span.textContent = "#" + s;
        span.onclick = () => {
            document.querySelectorAll(".skill-badge").forEach(b => b.classList.remove("active"));
            span.classList.add("active");
        };
        skillDiv.appendChild(span);
    });

    // Render Portofolio (Works)
    const worksDiv = document.getElementById('worksGrid');
    data.works?.forEach(w => {
        const card = document.createElement("div");
        card.className = "work-card";
        card.innerHTML = `<img src="${w.image}"><p>${w.title}</p>`;
        worksDiv.appendChild(card);
    });

    // Update Indikator Tab Awal
    updateTabIndicator(document.querySelector(".tabs span.active"));
}

// Logika Tab & Navigasi
function updateTabIndicator(element) {
    const indicator = document.querySelector(".tab-indicator");
    if (element && indicator) {
        indicator.style.width = element.offsetWidth + "px";
        indicator.style.left = element.offsetLeft + "px";
    }
}

document.querySelectorAll(".tabs span").forEach(tab => {
    tab.addEventListener("click", () => {
        const heroText = document.getElementById('heroText');
        const heroImage = document.getElementById('heroImage');

        // Ganti Class Active Tab
        document.querySelectorAll(".tabs span").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");

        // Ganti Section Active
        document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
        document.getElementById(tab.dataset.tab).classList.add("active");

        // Efek Hero (Hanya muncul foto jika di tab 'resume' sesuai request awal kamu)
        if (tab.dataset.tab === "resume") {
            heroText.style.opacity = "0";
            heroImage.style.display = "block";
        } else {
            heroText.style.opacity = "1";
            heroImage.style.display = "none";
        }

        updateTabIndicator(tab);
    });
});

// Jalankan Pengambilan Data
loadCreatorData();
</script>

</body>
</html>
