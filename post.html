<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Creator Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/post.css">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h2 class="sidebar-logo">Menu</h2>
  </div>
  <nav class="sidebar-nav">
    <a href="#" class="nav-item active" data-category="karya">Karya</a>
    <a href="#" class="nav-item" data-category="prestasi">Prestasi</a>
    <a href="#" class="nav-item" data-category="photography">Photography</a>
    <a href="#" class="nav-item" data-category="mountain">Mountain</a>
    <hr class="nav-divider">
<a href="admin.html" class="nav-item" id="adminPanelBtn">Admin Panel</a>

  </nav>
</div>

<div class="search-wrapper">
  <div class="menu-toggle" id="mobileMenuBtn">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="brutal-input-container">
    <input
      type="text"
      id="searchCreator"
      placeholder="Cari kreator..."
      class="brutal-input"
      required
    />
  </div>
</div>


<div class="gallery" id="mainGallery">
  <div class="loading-state" style="color: white; text-align: center; grid-column: 1/-1; padding: 50px;">
    <p>Memuat karya terbaru...</p>
  </div>
</div>

<div id="notif"></div>

<div class="comment-modal" id="commentModal">
  <div class="comment-popup">
    <div class="comment-header">
      <span>Komentar</span>
      <span class="comment-close">×</span>
    </div>
    <div class="comment-list"></div>
    <input class="comment-input" placeholder="Tulis komentar lalu Enter">
  </div>
</div>

<div id="loginPopup" class="popup-overlay">
  <div class="popup-content">
    <span class="close-login">X</span>
    <h2 style="text-align: center; margin-bottom: 20px;">Welcome Back</h2>
    
    <form class="form">
      <div class="flex-column"><label>Email</label></div>
      <div class="inputForm">
        <svg height="20" viewBox="0 0 32 32" width="20"><path d="m30.853 13.87a15 15 0 0 0 -29.729 4.082 15.1 15.1 0 0 0 12.876 12.918 15.6 15.6 0 0 0 2.016.13 14.85 14.85 0 0 0 7.715-2.145 1 1 0 1 0 -1.031-1.711 13.007 13.007 0 1 1 5.458-6.529 2.149 2.149 0 0 1 -4.158-.759v-10.856a1 1 0 0 0 -2 0v1.726a8 8 0 1 0 .2 10.325 4.135 4.135 0 0 0 7.83.274 15.2 15.2 0 0 0 .823-7.455zm-14.853 8.13a6 6 0 1 1 6-6 6.006 6.006 0 0 1 -6 6z"></path></svg>
        <input type="email" class="input" placeholder="Enter your Email" required>
      </div>

      <div class="flex-column"><label>Password</label></div>
      <div class="inputForm">
        <svg height="20" viewBox="0 0 24 24" width="20"><path d="M12.1 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3 9.24 3 10.91 3.81 12 5.09 13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5 22 12.28 18.6 15.36 13.55 20.04z"/></svg>
        <input type="password" class="input" placeholder="Enter your Password" required>
      </div>

      <button class="button-submit" type="submit">Sign In</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/post.js"></script>

</body>
</html>
