<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Hope Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #121212; color: white; padding: 20px; display: flex; justify-content: center; }
        .admin-container { width: 100%; max-width: 500px; background: #1e1e1e; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 20px; color: #00ff88; }
        label { font-size: 0.9rem; color: #bbb; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0 20px 0; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; }
        input:focus { border-color: #00ff88; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-check { background: #ffcc00; color: #000; }
        .btn-save { background: #00ff88; color: #000; margin-top: 10px; }
        .preview-card { background: #2a2a2a; padding: 20px; border-radius: 10px; margin-top: 25px; display: none; border-top: 4px solid #00ff88; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #img-preview { width: 100%; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Upload New Song</h2>
    
    <label>YouTube Link</label>
    <input type="text" id="yt-link" placeholder="https://www.youtube.com/watch?v=...">
    <button class="btn-check" onclick="checkYouTubeData()">Check Data</button>

    <div id="preview-section" class="preview-card">
        <label>Preview Cover</label>
        <img id="img-preview" src="">
        
        <label>Song Title</label>
        <input type="text" id="form-title" placeholder="Judul Lagu">
        
        <label>Artist Name</label>
        <input type="text" id="form-artist" placeholder="Nama Artis">
        
        <label>Artist Bio</label>
        <textarea id="form-bio" placeholder="Bio Artis" rows="3"></textarea>
        
        <label>Category</label>
        <select id="form-category">
            <option value="viral_song">Viral Song</option>
            <option value="playlist">Playlist</option>
            <option value="trend">Trend</option>
            <option value="trending">Trending</option>
            <option value="hopers">Hopers</option>
        </select>

        <label>Audio Streaming URL (Direct Link .mp3)</label>
        <input type="text" id="form-audio" placeholder="https://contoh.com/file_lagu.mp3">

        <button class="btn-save" onclick="saveToSupabase()">Save to Library</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const supabaseUrl = 'https://hqetnqnvmdxdgfnnluew.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxZXRucW52bWR4ZGdmbm5sdWV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzUyODIsImV4cCI6MjA4NzMxMTI4Mn0.Cr9lDBZMqfeONi1dfyFzHpBtawBzZTQLBEWKmPJVAOA';
    const db = supabase.createClient(supabaseUrl, supabaseKey);

    async function checkYouTubeData() {
        const link = document.getElementById('yt-link').value;
        if(!link) return alert("Paste linknya dulu!");

        try {
            const response = await fetch(`https://www.youtube.com/oembed?url=${link}&format=json`);
            if (!response.ok) throw new Error();
            const data = await response.json();

            document.getElementById('preview-section').style.display = 'block';
            document.getElementById('img-preview').src = data.thumbnail_url;
            document.getElementById('form-title').value = data.title;
            document.getElementById('form-artist').value = data.author_name;
            document.getElementById('form-bio').value = `Official track by ${data.author_name}`;
        } catch (err) {
            alert("Gagal ambil data YouTube!");
        }
    }

    async function saveToSupabase() {
        const audioUrl = document.getElementById('form-audio').value;

        if(!audioUrl.startsWith('http')) {
            return alert("Masukkan link URL audio yang valid!");
        }

        const newData = {
            title: document.getElementById('form-title').value,
            artist: document.getElementById('form-artist').value,
            bio: document.getElementById('form-bio').value,
            cover_url: document.getElementById('img-preview').src,
            audio_src: audioUrl,
            category: document.getElementById('form-category').value
        };

        const { error } = await db.from('songs').insert([newData]);

        if (error) {
            alert("Gagal simpan: " + error.message);
        } else {
            alert("Berhasil disimpan ke kategori " + newData.category);
            location.reload();
        }
    }
</script>
</body>
</html>
